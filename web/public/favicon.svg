<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#2EC4B6"/>

  <!-- Panda ears (black) -->
  <circle cx="22" cy="22" r="16" fill="#1F2937"/>
  <circle cx="78" cy="22" r="16" fill="#1F2937"/>

  <!-- Panda face (white) -->
  <circle cx="50" cy="54" r="34" fill="#FFFFFF"/>

  <!-- Eye patches (black) -->
  <ellipse cx="37" cy="46" rx="11" ry="10" fill="#1F2937"/>
  <ellipse cx="63" cy="46" rx="11" ry="10" fill="#1F2937"/>

  <!-- Eyes (white) -->
  <circle cx="37" cy="46" r="5" fill="#FFFFFF"/>
  <circle cx="63" cy="46" r="5" fill="#FFFFFF"/>

  <!-- Pupils (black) -->
  <circle cx="38" cy="46" r="3" fill="#1F2937"/>
  <circle cx="64" cy="46" r="3" fill="#1F2937"/>

  <!-- Eye shine -->
  <circle cx="39" cy="44" r="1" fill="#FFFFFF"/>
  <circle cx="65" cy="44" r="1" fill="#FFFFFF"/>

  <!-- Nose -->
  <ellipse cx="50" cy="58" rx="5" ry="3.5" fill="#FF8FA3"/>

  <!-- Mouth -->
  <path d="M 43 63 Q 50 69 57 63" stroke="#1F2937" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <circle cx="30" cy="62" r="6" fill="#FF8FA3" opacity="0.4"/>
  <circle cx="70" cy="62" r="6" fill="#FF8FA3" opacity="0.4"/>
</svg>
